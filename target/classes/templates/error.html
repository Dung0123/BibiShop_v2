<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lỗi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-danger">Đã xảy ra lỗi</h1>
    <p>Đã có lỗi xảy ra trong quá trình xử lý yêu cầu của bạn.</p>
    <p><strong>Mã lỗi:</strong> <span th:text="${status}"></span></p>
    <p><strong>Thông báo:</strong> <span th:text="${error}"></span></p>
    <p><strong>Chi tiết:</strong> <span th:text="${message}"></span></p>
    <a href="/" class="btn btn-primary">Quay lại trang chủ</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html layout:decorate="~{admin/layout}" lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Sản Phẩm</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script th:src="'https://cdn.jsdelivr.net/npm/sweetalert2@11'"></script>

</head>
<body>
<div class="wrapper wrapper-content" layout:fragment="content">
    <div class="wrapper wrapper-content">
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>Quản Lý Sản Phẩm</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                            <form th:object="${sanPham}" id="danhMucForm" method="post">
                                <input type="hidden" th:field="*{id}"/>
                                <div class="col-sm-6 b-r">
                                    <label for="tenSanPham" class="form-label">Tên Sản Phẩm</label>
                                    <input type="text" th:field="*{tenSanPham}" class="form-control" id="tenSanPham"
                                           placeholder="Nhập tên Sản Phẩm" style="width: 500px">
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-group"><label>Trạng Thái</label>
                                        <select class="form-control m-b" th:field="*{trangThai}">
                                            <option th:value="0">Đang Kinh Doanh</option>
                                            <option th:value="1">Ngừng Kinh Doanh</option>
                                        </select>
                                    </div>
                                    <p class="pull-right">
                                        <button type="button" id="btnThem" class="btn btn-primary"
                                                onclick="confirmAdd()">Thêm
                                        </button>
                                        <button type="button" class="btn btn-success" onclick="confirmUpdate()">Cập nhật
                                        </button>
                                        <a class="btn btn-warning" th:href="@{/admin/sanpham/reset}">Reset</a>
                                    </p>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>Danh Sách Sản Phẩm</h5>
                        <div class="ibox-tools">
                            <a class="collapse-link">
                                <i class="fa fa-chevron-up"></i>
                            </a>
                        </div>
                    </div>
                    <div class="ibox-content">
                        <table class="table">
                            <thead>
                            <tr>
                                <th>STT</th>
                                <th>Tên Sản Phẩm</th>
                                <th>Ngày Nhập</th>
                                <th>Trạng Thái</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item, iterStat : ${list}">
                                <td th:text="${iterStat.count}"></td>
                                <td th:text="${item.tenSanPham}"></td>
                                <!--                <td th:text="${#dates.format(item.createDate, 'dd/MM/yyyy')}"></td>-->
                                <td></td>
                                <td th:switch="${item.trangThai}">
                                    <span th:case="0" class="badge badge-primary">Hoạt Động</span>
                                    <span th:case="1" class="badge badge-danger">Ngừng</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/sanpham/view/{id}(id=${item.id})}"
                                       class="btn btn-success  dim">
                                        <i class="fa fa-eye"></i></a>
                                    <a th:attr="onclick=|confirmDelete(${item.id}, '${item.tenSanPham}')|"
                                       class="btn btn-danger dim" type="button">
                                        <i class="fa fa-trash-o"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                        <div class="text-center">
                            <div class="footable-visible d-flex justify-content-center">
                                <ul class="pagination justify-content-center">

                                    <!-- Nút về đầu << -->
                                    <li th:classappend="${currentPage == 1} ? 'disabled'">
                                        <a th:href="${currentPage == 1} ? 'javascript:void(0)' : @{/admin/sanpham/getAll(page=1)}">«</a>
                                    </li>

                                    <!-- Nút lùi 1 trang < (chỉ hiện nếu totalPages > 1) -->
                                    <li th:if="${totalPages > 1}" th:classappend="${currentPage == 1} ? 'disabled'">
                                        <a th:href="${currentPage == 1} ? 'javascript:void(0)' : @{/admin/sanpham/getAll(page=${currentPage - 1})}">‹</a>
                                    </li>

                                    <!-- Nếu totalPages = 1 -->
                                    <li th:if="${totalPages == 1}" class="active">
                                        <a>1</a>
                                    </li>

                                    <!-- Nếu totalPages = 2 hoặc 3, hiển thị đầy đủ các trang -->
                                    <li th:if="${totalPages > 1 and totalPages <= 3}"
                                        th:each="pageNum : ${#numbers.sequence(1, totalPages)}"
                                        th:classappend="${pageNum == currentPage} ? 'active'">
                                        <a th:href="@{/admin/sanpham/getAll(page=${pageNum})}" th:text="${pageNum}"></a>
                                    </li>

                                    <!-- Nếu totalPages > 3, hiển thị 3 trang đầu -->
                                    <li th:if="${totalPages > 3}" th:each="pageNum : ${#numbers.sequence(1, 3)}"
                                        th:classappend="${pageNum == currentPage} ? 'active'">
                                        <a th:href="@{/admin/sanpham/getAll(page=${pageNum})}" th:text="${pageNum}"></a>
                                    </li>

                                    <!-- Dấu ... nếu totalPages > 3 -->
                                    <li th:if="${totalPages > 3}">
                                        <a>...</a>
                                    </li>

                                    <!-- Trang cuối nếu totalPages > 3 -->
                                    <li th:if="${totalPages > 3}"
                                        th:classappend="${currentPage == totalPages} ? 'active'">
                                        <a th:href="@{/admin/sanpham/getAll(page=${totalPages})}"
                                           th:text="${totalPages}"></a>
                                    </li>

                                    <!-- Nút tiến 1 trang > (chỉ hiện nếu totalPages > 1) -->
                                    <li th:if="${totalPages > 1}"
                                        th:classappend="${currentPage == totalPages} ? 'disabled'">
                                        <a th:href="${currentPage == totalPages} ? 'javascript:void(0)' : @{/admin/sanpham/getAll(page=${currentPage + 1})}">›</a>
                                    </li>

                                    <!-- Nút về cuối >> -->
                                    <li th:classappend="${currentPage == totalPages} ? 'disabled'">
                                        <a th:href="${currentPage == totalPages} ? 'javascript:void(0)' : @{/admin/sanpham/getAll(page=${totalPages})}">»</a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            function confirmAdd() {
                Swal.fire({
                    title: 'Xác nhận thêm sản phẩm',
                    text: 'Bạn có chắc muốn thêm sản phẩm này?',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'Thêm',
                    cancelButtonText: 'Hủy',
                    confirmButtonColor: '#3085d6',
                    cancelButtonColor: '#d33'
                }).then((result) => {
                    if (result.isConfirmed) {
                        const form = document.getElementById('danhMucForm');
                        form.action = '/admin/sanpham/add'; // set action trước khi submit
                        form.submit();
                    }
                });
            }

            function confirmUpdate() {
                Swal.fire({
                    title: 'Xác nhận sửa sản phẩm',
                    text: 'Bạn có chắc muốn sửa sản phẩm này?',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'Sửa',
                    cancelButtonText: 'Hủy',
                    confirmButtonColor: '#3085d6',
                    cancelButtonColor: '#d33'
                }).then((result) => {
                    if (result.isConfirmed) {
                        const form = document.getElementById('danhMucForm');
                        form.action = '/admin/sanpham/update';
                        form.submit();
                    }
                });
            }

            function confirmDelete(id, tenSanPham) {
                Swal.fire({
                    title: 'Xoá sản phẩm: ' + tenSanPham + '?',
                    text: 'Bạn có chắc chắn muốn xoá sản phẩm này?',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: 'Xoá',
                    cancelButtonText: 'Huỷ'
                }).then((result) => {
                    if (result.isConfirmed) {
                        $.ajax({
                            url: '/admin/sanpham/delete/' + id,
                            type: 'POST',
                            success: function () {
                                Swal.fire('Đã xoá!', 'Sản phẩm đã được xoá thành công.', 'success').then(() => {
                                    location.reload();
                                });
                            },
                            error: function () {
                                Swal.fire('Lỗi!', 'Không thể xoá sản phẩm.', 'error');
                            }
                        });
                    }
                });
            }

        </script>
    </div>
</div>
</body>

<script th:src="@{/js/jquery-3.1.1.min.js}"></script>
<script th:src="@{/js/bootstrap.min.js}"></script>
<script th:src="@{/js/plugins/metisMenu/jquery.metisMenu.js}"></script>
<script th:src="@{/js/plugins/slimscroll/jquery.slimscroll.min.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.tooltip.min.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.spline.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.resize.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.pie.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.symbol.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.time.js}"></script>
<script th:src="@{/js/plugins/peity/jquery.peity.min.js}"></script>
<script th:src="@{/js/demo/peity-demo.js}"></script>
<script th:src="@{/js/inspinia.js}"></script>
<script th:src="@{/js/plugins/pace/pace.min.js}"></script>
<script th:src="@{/js/plugins/jquery-ui/jquery-ui.min.js}"></script>
<script th:src="@{/js/plugins/jvectormap/jquery-jvectormap-2.0.2.min.js}"></script>
<script th:src="@{/js/plugins/jvectormap/jquery-jvectormap-world-mill-en.js}"></script>
<script th:src="@{/js/plugins/easypiechart/jquery.easypiechart.js}"></script>
<script th:src="@{/js/plugins/sparkline/jquery.sparkline.min.js}"></script>
<script th:src="@{/js/demo/sparkline-demo.js}"></script>
</html>

<!DOCTYPE html>
<html layout:decorate="~{admin/layout}" lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div class="wrapper wrapper-content" layout:fragment="content">

  <div class="row">
    <div class="col-lg-12">
      <div class="ibox float-e-margins">
        <div class="ibox-title">
          <h5>Danh Sách Phiếu Giảm Giá</h5>
          <div class="ibox-tools">
            <a class="collapse-link">
              <i class="fa fa-chevron-up"></i>
            </a>
            <a class="dropdown-toggle" data-toggle="dropdown" href="#">
              <i class="fa fa-wrench"></i>
            </a>
            <a class="close-link">
              <i class="fa fa-times"></i>
            </a>
          </div>
        </div>
        <div class="ibox-content">
          <a class="btn btn-primary btn-rounded" th:href="@{/admin/MaGiamGia/add}"><i class="fa fa-plus"></i> Thêm Phiếu Giảm
            Giá </a>
        </div>
        <div class="ibox-content">
          <table class="table">
            <thead>
            <tr>
              <th>ID</th>
              <th>Tên</th>
              <th>Mã</th>
              <th>Giá Trị Giảm</th>
              <th>Loại Giảm Giá</th>
              <th>Ngày Bắt Đầu</th>
              <th>Ngày Kết Thúc</th>
              <th>Gía trị giảm tối đa</th>
              <th>Trạng Thái</th>
              <th>Thao Tác</th>

            </tr>
            </thead>
            <tbody>
            <tr th:each="item: ${list}">
                <td th:text="${item.id}"></td>
                <td th:text="${item.ten}"></td>
                <td th:text="${item.ma}"></td>
                <td th:text="${item.giaTriGiam}"></td>
                <td th:text="${item.loaiVoucher} == 0 ? 'Giảm giá theo giá trị' : 'Giảm giá phần trăm'"></td>
                <td th:text="${item.ngayBatDau}"></td>
                <td th:text="${item.ngayKetThuc}"></td>
              <td th:text="${item.giamToiDa}"></td>
              <td th:switch="${item.trangThai}">
                <span th:case="1" class="badge badge-primary">Hoạt Động</span>
                <span th:case="0" class="badge badge-danger">Ngừng</span>
              <td>
                  <a th:href="@{/admin/MaGiamGia/view/{id}(id=${item.id})}" class="btn btn-success  dim" >
                      <i class="fa fa-eye"></i></a>
                <a class="btn btn-danger dim" type="button"><i
                    class="fa fa-trash-o"></i></a>
              </td>

            </tr>
            <tr>
              <td colspan="5" class="footable-visible">
                <ul class="pagination pull-right">
                  <li th:classappend="${currentPage == 1} ? 'disabled'">
                    <a th:href="@{/admin/MaGiamGia/list(page=1)}">«</a>
                  </li>

                  <li th:classappend="${currentPage == 1} ? 'disabled'">
                    <a th:href="@{/admin/MaGiamGia/list(page=${currentPage - 1})}">‹</a>
                  </li>

                  <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                      th:classappend="${i == currentPage} ? 'active'">
                    <a th:href="@{/admin/MaGiamGia/list(page=${i})}" th:text="${i}"></a>
                  </li>

                  <li th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a th:href="@{/admin/MaGiamGia/list(page=${currentPage + 1})}">›</a>
                  </li>

                  <li th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a th:href="@{/admin/MaGiamGia/list(page=${totalPages})}">»</a>
                  </li>
                </ul>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>


<!-- Mainly scripts -->
<script src="/plugin/js/jquery-3.1.1.min.js"></script>
<script src="/plugin/js/bootstrap.min.js"></script>
<script src="/plugin/js/plugins/metisMenu/jquery.metisMenu.js"></script>
<script src="/plugin/js/plugins/slimscroll/jquery.slimscroll.min.js"></script>

<!-- Flot -->
<script src="/plugin/js/plugins/flot/jquery.flot.js"></script>
<script src="/plugin/js/plugins/flot/jquery.flot.tooltip.min.js"></script>
<script src="/plugin/js/plugins/flot/jquery.flot.spline.js"></script>
<script src="/plugin/js/plugins/flot/jquery.flot.resize.js"></script>
<script src="/plugin/js/plugins/flot/jquery.flot.pie.js"></script>
<script src="/plugin/js/plugins/flot/jquery.flot.symbol.js"></script>
<script src="/plugin/js/plugins/flot/jquery.flot.time.js"></script>

<!-- Peity -->
<script src="/plugin/js/plugins/peity/jquery.peity.min.js"></script>
<script src="/plugin/js/demo/peity-demo.js"></script>

<!-- Custom and plugin javascript -->
<script src="/plugin/js/inspinia.js"></script>
<script src="/plugin/js/plugins/pace/pace.min.js"></script>

<!-- jQuery UI -->
<script src="/plugin/js/plugins/jquery-ui/jquery-ui.min.js"></script>

<!-- Jvectormap -->
<script src="/plugin/js/plugins/jvectormap/jquery-jvectormap-2.0.2.min.js"></script>
<script src="/plugin/js/plugins/jvectormap/jquery-jvectormap-world-mill-en.js"></script>

<!-- EayPIE -->
<script src="/plugin/js/plugins/easypiechart/jquery.easypiechart.js"></script>

<!-- Sparkline -->
<script src="/plugin/js/plugins/sparkline/jquery.sparkline.min.js"></script>

<!-- Sparkline demo data  -->
<script src="/plugin/js/demo/sparkline-demo.js"></script>


</body>

</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" >
<head>
  <meta charset="UTF-8">
  <title>Quản lý hóa đơn</title>
  <style>
    .sort-link { text-decoration: none; margin-left: 5px; }
    .clickable-row:hover { background-color: #f5f5f5; }
  </style>
</head>
<body>
<th:block th:fragment="body">
  <div class="container">
    <input type="hidden" id="pageValue" th:value="${param.page}"/>
    <input type="hidden" id="sortValue" th:value="${param.sort}"/>
    <input type="hidden" id="ngayTaoStartValue" th:value="${param.ngayTaoStart}"/>
    <input type="hidden" id="ngayTaoEndValue" th:value="${param.ngayTaoEnd}"/>
    <h4 class="mt-4">Quản lý hóa đơn</h4>
    <form th:action="@{/admin/bill-list}" method="GET" id="form-search">
      <div class="my-3">
        <div class="row">
          <div class="form-group col-md-2">
            <label for="maDinhDanh">Mã hóa đơn</label>
            <input type="text" class="form-control" id="maDinhDanh" name="maDinhDanh" placeholder="Mã hóa đơn" th:value="${maDinhDanh}">
          </div>
        </div>
        <button type="submit" class="btn btn-primary m-1"><i class="fa fa-search"></i> Tìm kiếm</button>
        <a th:href="@{/admin/bill-list}" class="btn btn-secondary m-1">Hủy bỏ</a>
      </div>
    </form>

    <table class="table table-hover border my-3" id="billTable">
      <thead class="thead-light">
      <tr>
        <th>Mã hóa đơn
          <a th:href="@{/admin/bill-list(page=0, sort=${sortField == 'maHoaDon' && sortDirection == 'asc' ? 'maHoaDon,desc' : 'maHoaDon,asc'}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="sort-link">↑</a>
          <a th:href="@{/admin/bill-list(page=0, sort=${sortField == 'maHoaDon' && sortDirection == 'desc' ? 'maHoaDon,asc' : 'maHoaDon,desc'}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="sort-link">↓</a>
        </th>
        <th>Họ và tên
          <a th:href="@{/admin/bill-list(page=0, sort=${sortField == 'khachHang.ten' && sortDirection == 'asc' ? 'khachHang.ten,desc' : 'khachHang.ten,asc'}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="sort-link">↑</a>
          <a th:href="@{/admin/bill-list(page=0, sort=${sortField == 'khachHang.ten' && sortDirection == 'desc' ? 'khachHang.ten,asc' : 'khachHang.ten,desc'}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="sort-link">↓</a>
        </th>
        <th>Số điện thoại</th>
        <th>Ngày đặt
          <a th:href="@{/admin/bill-list(page=0, sort=${sortField == 'ngayTao' && sortDirection == 'asc' ? 'ngayTao,desc' : 'ngayTao,asc'}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="sort-link">↑</a>
          <a th:href="@{/admin/bill-list(page=0, sort=${sortField == 'ngayTao' && sortDirection == 'desc' ? 'ngayTao,asc' : 'ngayTao,desc'}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="sort-link">↓</a>
        </th>
        <th>Tổng tiền
          <a th:href="@{/admin/bill-list(page=0, sort=${sortField == 'tongTien' && sortDirection == 'asc' ? 'tongTien,desc' : 'tongTien,asc'}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="sort-link">↑</a>
          <a th:href="@{/admin/bill-list(page=0, sort=${sortField == 'tongTien' && sortDirection == 'desc' ? 'tongTien,asc' : 'tongTien,desc'}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="sort-link">↓</a>
        </th>
        <th>Loại đơn</th>
        <th>Hình thức TT</th>
        <th>Trạng thái</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="item : ${items.content}" class="clickable-row" th:data-maHoaDon="${item.maHoaDon}">
        <th th:text="${item.maHoaDon}"></th>
        <td th:text="${item.khachHang != null ? (item.khachHang.ho + ' ' + item.khachHang.tenDem + ' ' + item.khachHang.ten) : 'Khách lẻ'}"></td>
        <td th:text="${item.khachHang != null ? item.khachHang.sdt : ''}"></td>
        <td th:text="${#temporals.format(item.ngayTao, 'dd-MM-yyyy HH:mm')}"></td>
        <td th:text="${#numbers.formatDecimal(item.tongTien, 0, 'POINT', 0, 'COMMA')}"></td>
        <td>
          <span th:if="${item.loaiHoaDon == 'OFFLINE'}">Tại quầy</span>
          <span th:if="${item.loaiHoaDon == 'ONLINE'}">Online</span>
        </td>
        <td>
          <span th:if="${item.hinhThucThanhToan == 'THE'}">Thẻ</span>
          <span th:if="${item.hinhThucThanhToan == 'CHUYEN_KHOAN'}">Chuyển khoản</span>
          <span th:if="${item.hinhThucThanhToan == 'TIEN_MAT'}">Tiền mặt</span>
        </td>
        <td>
          <span class="text-warning p-1 rounded border border-warning" th:if="${item.trangThai == 'CHO_XAC_NHAN'}">Chờ xác nhận</span>
          <span class="text-secondary p-1 rounded border border-secondary" th:if="${item.trangThai == 'CHO_LAY_HANG'}">Chờ lấy hàng</span>
          <span class="text-primary p-1 rounded border border-primary" th:if="${item.trangThai == 'CHO_GIAO_HANG'}">Chờ giao hàng</span>
          <span class="text-success p-1 rounded border border-success" th:if="${item.trangThai == 'HOAN_THANH'}">Hoàn thành</span>
          <span class="text-dark p-1 rounded border border-dark" th:if="${item.trangThai == 'TRA_HANG'}">Trả hàng</span>
          <span class="text-danger p-1 rounded border border-danger" th:if="${item.trangThai == 'HUY'}">Hủy</span>
        </td>
      </tr>
      </tbody>
    </table>
    <div class="clearfix float-end mb-4">
      <ul class="pagination">
        <li th:classappend="${items.hasPrevious() ? '' : 'disabled'}" class="page-item">
          <a th:href="@{/admin/bill-list(page=0, sort=${sortField + ',' + sortDirection}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="page-link">««</a>
        </li>
        <li th:classappend="${items.hasPrevious() ? '' : 'disabled'}" class="page-item">
          <a th:href="@{/admin/bill-list(page=${items.number - 1}, sort=${sortField + ',' + sortDirection}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="page-link">«</a>
        </li>
        <li th:classappend="${items.hasNext() ? '' : 'disabled'}" class="page-item">
          <a th:href="@{/admin/bill-list(page=${items.number + 1}, sort=${sortField + ',' + sortDirection}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="page-link">»</a>
        </li>
        <li th:classappend="${items.hasNext() ? '' : 'disabled'}" class="page-item">
          <a th:href="@{/admin/bill-list(page=${items.totalPages - 1}, sort=${sortField + ',' + sortDirection}, maDinhDanh=${maDinhDanh}, ngayTaoStart=${ngayTaoStart}, ngayTaoEnd=${ngayTaoEnd}, trangThai=${trangThai}, loaiDon=${loaiDon}, hoVaTen=${hoVaTen}, soDienThoai=${soDienThoai})}" class="page-link">»»</a>
        </li>
      </ul>
    </div>
  </div>

  <script th:inline="javascript">
    var lastClickTime = 0;
    var doubleClickDelay = 300;
    var clickableRows = document.querySelectorAll(".clickable-row");
    clickableRows.forEach(function(row) {
      row.addEventListener("click", function(e) {
        var currentTime = new Date().getTime();
        if (currentTime - lastClickTime < doubleClickDelay) {
          var maHoaDon = row.getAttribute("data-maHoaDon");
          window.location.href = "/admin/getbill-detail/" + maHoaDon;
        }
        lastClickTime = currentTime;
      });
    });
  </script>
</th:block>
</body>
</html>

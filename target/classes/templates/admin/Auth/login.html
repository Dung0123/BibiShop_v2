<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BibiShop | Login</title>

    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/font-awesome/css/font-awesome.css" rel="stylesheet">

    <link href="/css/animate.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">

</head>

<body class="gray-bg">

<div class="middle-box text-center loginscreen animated fadeInDown">
    <div>
        <div>
            <h1 class="logo-name">BIBI+<LOGIN></LOGIN></h1>
        </div>
        <h3>Welcome to Bibishop Dashboard</h3>
        <form class="m-t" role="form" action="/login" method="post">
            <div class="form-group">
                <input type="email" class="form-control" name="username" placeholder="Username hoặc Email" required="">
            </div>
            <div class="form-group">
                <input type="password" class="form-control" name="password"placeholder="Mật Khẩu" required="">
            </div>
            <button type="submit" class="btn btn-primary block full-width m-b">Login</button>

            <a href="#"><small>Forgot password?</small></a>
            <p class="text-muted text-center"><small>Do not have an account?</small></p>
            <a class="btn btn-sm btn-white btn-block" href="">Create an account</a>
        </form>
        <p class="m-t"> <small>SD-12 &copy; 2024</small> </p>
    </div>
</div>

<script src="/js/jquery-3.1.1.min.js"></script>
<script src="/js/bootstrap.min.js"></script>

</body>

</html>

<!DOCTYPE html>
<html layout:decorate="~{admin/layout}" lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div class="wrapper wrapper-content" layout:fragment="content">

    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>Chi Tiết và Cập Nhật Thông Tin Khách Hàng</h5>
                    <div class="ibox-tools">
                        <a class="collapse-link">
                            <i class="fa fa-chevron-up"></i>
                        </a>
                        <a class="dropdown-toggle" data-toggle="dropdown" href="#">
                            <i class="fa fa-wrench"></i>
                        </a>
                    </div>
                </div>
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-lg-12">
                            <form role="form">
                                <div class="col-sm-6 b-r">
                                    <div class="form-group"><label>Email</label>
                                        <input th:value="${khachHang.email}" type="email" placeholder="Enter email" class="form-control">
                                    </div>

                                    <div class="form-group"><label>Họ
                                    </label>
                                        <input th:value="${khachHang.ho}" type="text" placeholder="Họ" class="form-control">
                                    </div>
                                    <div class="form-group"><label>Tên Đệm
                                    </label>
                                        <input  th:value="${khachHang.tenDem}" type="text" placeholder="Tên đệm" class="form-control">
                                    </div>
                                    <div class="form-group"><label>Tên
                                    </label>
                                        <input th:value="${khachHang.ten}"type="text" placeholder="Tên" class="form-control">
                                    </div>

                                </div>
                                <div class="col-sm-6">
                                    <div class="form-group"><label>Số Điện Thoại</label>
                                        <input th:value="${khachHang.sdt}" type="text" placeholder="Phone" class="form-control">
                                    </div>
                                    <div class="form-group"><label>Ngày Sinh
                                    </label>
                                        <input  th:value="${#dates.format(khachHang.ngaySinh, 'yyyy-MM-dd')}" type="date" class="form-control">
                                    </div>
                                    <div class="form-group">
                                        <label class="required-label">Trạng Thái</label>
                                        <select class="form-control" id="trangThai">
                                            <option value="1" th:selected="${khachHang.trangThai == 1}">Hoạt động</option>
                                            <option value="0" th:selected="${khachHang.trangThai == 0}">Không hoạt động</option>
                                        </select>
<!--                                        <span class="invalid-feedback" id="invalid-feedback-trangThai">Trạng thái không được để trống</span>-->
                                    </div>
                                    <div class="form-group"><label>Địa Chỉ</label>
                                        <input th:value="${khachHang.address}"  type="text" placeholder="Address" class="form-control">
                                    </div>

                                </div>
                                <div class="col-md-12">
                                    <div class="col-sm-3 col-sm-offset-2 pull-right">
                                        <button class="btn btn-primary" type="submit">Cập Nhật</button>
                                        <button class="btn btn-white" type="submit">Hủy</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>

</html>

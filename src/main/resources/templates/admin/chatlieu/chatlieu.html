<!DOCTYPE html>
<html layout:decorate="~{admin/layout}" lang="vi"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>Thể Loại </title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="wrapper wrapper-content" layout:fragment="content">
    <div class="container mt-4">


        <h2 class="mb-4 text-center"><b>QUẢN LÝ CHẤT LIỆU</b></h2>

        <!-- Thông báo lỗi -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>


        <!-- Form thêm / cập nhật -->
        <form th:action="@{/admin/chatlieu/add}" th:object="${chatLieu}" id="danhMucForm" method="post" class="container-fluid">
            <input type="hidden" th:field="*{id}"/>
            <div class="row" style="display: flex; margin-left: 100px">
                <div class="mb-3 col-6">
                    <label for="tenChatlieu" class="form-label">Tên Thể Loại </label>
                    <input type="text" th:field="*{ten}" class="form-control" id="tenChatlieu"
                           placeholder="Nhập tên Thể Loại " style="width: 500px">
                </div>


                <div class="col-6" style="margin-top:24px; margin-left: 10px ">
                    <button type="button" id="btnThem" class="btn btn-primary" onclick="confirmAdd()">Thêm</button>
                    <button type="button" class="btn btn-success" onclick="confirmUpdate()" >Cập nhật
                    </button>
                    <a class="btn btn-warning" th:href="@{/admin/theloai/reset}">Reset</a>
                </div>
            </div>


        </form>


        <hr/>


        <!-- Bảng danh sách -->
        <h4 class="mt-4">Danh sách Thể loại</h4>
        <table class="table table-bordered mt-2">
            <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Tên Thể Loại</th>
                <th>Trạng Thái</th>
                <th>Thao Tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, iterStat : ${list}">
                <td th:text="${iterStat.count}"></td>
                <td th:text="${item.ten}"></td>
                <td th:switch="${item.trangThai}">
                    <span th:case="0" class="badge badge-primary">Hoạt Động</span>
                    <span th:case="1" class="badge badge-danger">Ngừng</span>
                </td>
                <td>
                    <a  th:href="@{/admin/theloai/view/{id}(id=${item.id})}" class="btn btn-success  dim" >
                        <i class="fa fa-eye"></i></a>
                    <a th:attr="onclick=|confirmDelete(${item.id})|"
                       class="btn btn-danger dim"
                       type="button">
                        <i class="fa fa-trash-o"></i>
                    </a>


                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(list)}">
                <td colspan="3" class="text-center">Không có Thể Loại  nào.</td>
            </tr>
            </tbody>
        </table>
    </div>


    <script th:src="'https://cdn.jsdelivr.net/npm/sweetalert2@11'"></script>


    <script>
        function confirmAdd() {
            Swal.fire({
                title: 'Xác nhận thêm Thể Loại ',
                text: 'Bạn có chắc muốn thêm Thể Loại  này?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Thêm',
                cancelButtonText: 'Hủy',
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33'
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('danhMucForm').setAttribute('action', '/admin/theloai/add');
                    document.getElementById('danhMucForm').submit();
                }
            });
        }
        function confirmUpdate() {
            Swal.fire({
                title: 'Xác nhận sửa Thể Loại ',
                text: 'Bạn có chắc muốn sửa Thể Loại  này?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'sửa',
                cancelButtonText: 'Hủy',
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33'
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('danhMucForm').setAttribute('action', '/admin/theloai/update');
                    document.getElementById('danhMucForm').submit();
                }
            });
        }


        function confirmDelete(id) {
            Swal.fire({
                title: 'Xác nhận xóa Thể Loại ',
                text: 'Bạn có chắc muốn xóa Thể Loại  này?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Xóa',
                cancelButtonText: 'Hủy',
                confirmButtonColor: '#d33',
                cancelButtonColor: '#aaa'
            }).then((result) => {
                if (result.isConfirmed) {
                    $.ajax({
                        url: '/admin/theloai/delete/' + id,
                        type: 'POST',
                        success: function () {
                            Swal.fire('Đã xóa!', 'Thể Loại  đã được xóa thành công.', 'success').then(() => {
                                location.reload(); // Tải lại trang để cập nhật danh sách
                            });
                        },
                        error: function () {
                            Swal.fire('Lỗi!', 'Không thể xóa Thể Loại .', 'error');
                        }
                    });
                }
            });
        }
    </script>


</div>


</body>
<script th:src="@{/js/jquery-3.1.1.min.js}"></script>
<script th:src="@{/js/bootstrap.min.js}"></script>
<script th:src="@{/js/plugins/metisMenu/jquery.metisMenu.js}"></script>
<script th:src="@{/js/plugins/slimscroll/jquery.slimscroll.min.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.tooltip.min.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.spline.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.resize.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.pie.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.symbol.js}"></script>
<script th:src="@{/js/plugins/flot/jquery.flot.time.js}"></script>
<script th:src="@{/js/plugins/peity/jquery.peity.min.js}"></script>
<script th:src="@{/js/demo/peity-demo.js}"></script>
<script th:src="@{/js/inspinia.js}"></script>
<script th:src="@{/js/plugins/pace/pace.min.js}"></script>
<script th:src="@{/js/plugins/jquery-ui/jquery-ui.min.js}"></script>
<script th:src="@{/js/plugins/jvectormap/jquery-jvectormap-2.0.2.min.js}"></script>
<script th:src="@{/js/plugins/jvectormap/jquery-jvectormap-world-mill-en.js}"></script>
<script th:src="@{/js/plugins/easypiechart/jquery.easypiechart.js}"></script>
<script th:src="@{/js/plugins/sparkline/jquery.sparkline.min.js}"></script>
<script th:src="@{/js/demo/sparkline-demo.js}"></script>


</html>

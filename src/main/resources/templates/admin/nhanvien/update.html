<!DOCTYPE html>
<html layout:decorate="~{admin/layout}" lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết và Cập Nhật Thông Tin Nhân Viên</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css"/>
    <style>
        .invalid-feedback {
            display: none;
            color: red;
        }
        .required-label::after {
            content: '*';
            color: red;
        }
    </style>
</head>
<body>
<div class="wrapper wrapper-content" layout:fragment="content">
    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>Chi Tiết và Cập Nhật Thông Tin Nhân Viên</h5>
                    <div class="ibox-tools">
                        <a class="collapse-link">
                            <i class="fa fa-chevron-up"></i>
                        </a>
                        <a class="close-link">
                            <i class="fa fa-times"></i>
                        </a>
                    </div>
                </div>
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-lg-12">
                            <form role="form" id="employeeForm">
                                <div class="row">
                                    <div class="col-sm-6 b-r">
                                        <div class="form-group">
                                            <label class="required-label">Email</label>
                                            <input type="email" class="form-control" id="email" th:value="${nhanVien.email}"/>
                                            <span class="invalid-feedback" id="invalid-feedback-email">Email không hợp lệ</span>
                                        </div>
                                        <div class="form-group">
                                            <label class="required-label">Họ</label>
                                            <input type="text" class="form-control" id="firstName" th:value="${nhanVien.ho}"/>
                                            <span class="invalid-feedback" id="invalid-feedback-firstName">Họ không được để trống</span>
                                        </div>
                                        <div class="form-group">
                                            <label>Tên Đệm</label>
                                            <input type="text" class="form-control" id="midName" th:value="${nhanVien.tenDem}"/>
                                        </div>
                                        <div class="form-group">
                                            <label class="required-label">Tên</label>
                                            <input type="text" class="form-control" id="name" th:value="${nhanVien.ten}"/>
                                            <span class="invalid-feedback" id="invalid-feedback-name">Tên không được để trống</span>
                                        </div>
                                    </div>
                                    <div class="col-sm-6">
                                        <div class="form-group">
                                            <label class="required-label">Số Điện Thoại</label>
                                            <input type="text" class="form-control" id="sdt" th:value="${nhanVien.sdt}"/>
                                            <span class="invalid-feedback" id="invalid-feedback-sdt">Số điện thoại không hợp lệ</span>
                                        </div>
                                        <div class="form-group">
                                            <label class="required-label">Ngày Sinh</label>
                                            <input type="date" class="form-control" id="dob" th:value="${#dates.format(nhanVien.ngaySinh, 'yyyy-MM-dd')}"/>
                                            <span class="invalid-feedback" id="invalid-feedback-dob">Ngày sinh không hợp lệ</span>
                                        </div>
                                        <div class="form-group">
                                            <label class="required-label">Vị trí công việc</label>
                                            <select class="form-control" id="position">
                                                <option value="1" th:selected="${nhanVien.vaiTro == '1'}">Admin</option>
                                                <option value="2" th:selected="${nhanVien.vaiTro == '2'}">Nhân viên</option>
                                            </select>
                                            <span class="invalid-feedback" id="invalid-feedback-position">Vị trí không được để trống</span>
                                        </div>
                                        <div class="form-group">
                                            <label class="required-label">Trạng Thái</label>
                                            <select class="form-control" id="trangThai">
                                                <option value="1" th:selected="${nhanVien.trangThai == 1}">Hoạt động</option>
                                                <option value="0" th:selected="${nhanVien.trangThai == 0}">Không hoạt động</option>
                                            </select>
                                            <span class="invalid-feedback" id="invalid-feedback-trangThai">Trạng thái không được để trống</span>
                                        </div>
                                        <div class="form-group">
                                            <label class="required-label">Giới Tính</label>
                                            <select class="form-control" id="gender">
                                                <option value="Nam" th:selected="${nhanVien.gioiTinh == 'Nam'}">Nam</option>
                                                <option value="Nữ" th:selected="${nhanVien.gioiTinh == 'Nữ'}">Nữ</option>
                                            </select>
                                            <span class="invalid-feedback" id="invalid-feedback-gender">Giới tính không được để trống</span>
                                        </div>
                                        <div class="form-group">
                                            <div class="col-sm-12 text-right">
                                                <a th:href="@{/admin/khachhang/list}" class="btn btn-white">Hủy</a>
                                                <button type="button" class="btn btn-primary btn-update-promotion">Cập Nhật</button>
                                                <button type="button" class="btn btn-danger btn-delete-promotion">Xóa</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<script th:inline="javascript">
    $('.btn-update-promotion').click(function () {
        let email = $('#email').val();
        let sdt = $('#sdt').val();
        let name = $('#name').val();
        let midName = $('#midName').val();
        let dob = $('#dob').val();
        let position = $('#position').val();
        let status = $('#trangThai').val();
        let gender = $('#gender').val();
        let firstName = $('#firstName').val();
        let isValid = true;

        let regex = new RegExp("^[\\w-\\.]+@([\\w-]+\\.)+[\\w-]{2,4}$");
        if (email.length === 0 || regex.test(email) === false) {
            $('#invalid-feedback-email').show();
            isValid = false;
        }

        if (sdt.length === 0 ) {
            $('#invalid-feedback-sdt').show();
            isValid = false;
        }

        if (name.length === 0) {
            $('#invalid-feedback-name').show();
            isValid = false;
        }

        if (dob.length === 0) {
            $('#invalid-feedback-dob').show();
            isValid = false;
        }

        // if (loginName.length === 0) {
        //     $('#invalid-feedback-dob').show();
        //     isValid = false;
        // }

        if (position.length === 0) {
            $('#invalid-feedback-position').show();
            isValid = false;
        }

        if(gender.length === 0){
            $('#invalid-feedback-gender').show();
            isValid = false;
        }

        let req;
        if (isValid) {
            req = {
                email: email,
                sdt: sdt,
                name: name,
                midName: midName,
                dob: dob,
                role: position,
                status: status,
                firstName: firstName,
                gender: gender
            }
            const myJSON = JSON.stringify(req);
            $.ajax({
                url: '/admin/nhanvien/' + [[${nhanVien.id}]],
                type: 'PUT',
                contentType: 'application/json',
                data: myJSON,
                success: function (data) {
                    toastr.success("Cập nhật thành côngggg");
                    setTimeout(function () {
                        location.href = "/admin/nhanvien/list";
                    }, 5000);
                },
                error: function (data) {
                    toastr.warning(data.responseJSON.message);
                }
            })
        }
    });

    $('.btn-delete-promotion').click(function () {
        swal({
            title: 'Xóa thông tin nhân viên ?',
            text: "Bạn có chắc chắn muốn xóa !",
            type: 'warning',
            showCancelButton: true
        }).then(function (rs) {
           if (rs.value) {
                $.ajax({
                    url: '/admin/nhanvien/' + [[${nhanVien.id}]],
                    type: 'DELETE',
                    contentType: 'application/json',
                    success: function (data) {
                        toastr.success("Xóa nhân viên thành công");
                        setTimeout(function () {
                            location.href = "/admin/nhanvien/list";
                        }, 1000);
                    },
                    error: function (error) {
                        toastr.error(error.responseJSON.message);
                    }
                })
            }
        })
    })
</script>
</body>
</html>

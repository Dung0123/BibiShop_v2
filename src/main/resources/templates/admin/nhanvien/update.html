<!DOCTYPE html>
<html layout:decorate="~{admin/layout}" lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div class="wrapper wrapper-content" layout:fragment="content">

    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>Chi Tiết và Cập Nhật Thông Tin Nhân Viên</h5>
                    <div class="ibox-tools">
                        <a class="collapse-link">
                            <i class="fa fa-chevron-up"></i>
                        </a>
                        <a class="dropdown-toggle" data-toggle="dropdown" href="#">
                            <i class="fa fa-wrench"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-user">
                            <li><a href="#">Config option 1</a>
                            </li>
                            <li><a href="#">Config option 2</a>
                            </li>
                        </ul>
                        <a class="close-link">
                            <i class="fa fa-times"></i>
                        </a>
                    </div>
                </div>
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-lg-12">
                            <form role="form">
                                <div class="col-sm-6 b-r">
                                    <div class="form-group"><label>Email</label>
                                        <input type="email" placeholder="Enter email" class="form-control">
                                    </div>

                                    <div class="form-group"><label>Họ
                                    </label>
                                        <input type="text" placeholder="Họ" class="form-control">
                                    </div>
                                    <div class="form-group"><label>Tên Đệm
                                    </label>
                                        <input type="text" placeholder="tên đệm" class="form-control">
                                    </div>
                                    <div class="form-group"><label>Tên
                                    </label>
                                        <input type="text" placeholder="tên" class="form-control">
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-group"><label>Số Điện Thoại</label>
                                        <input type="text" placeholder="Phone" class="form-control">
                                    </div>
                                    <div class="form-group"><label>Ngày Sinh
                                    </label>
                                        <input type="date" class="form-control">
                                    </div>
                                    <div class="form-group"><label>Role</label>
                                        <input type="text" placeholder="role" class="form-control">
                                    </div>
                                    <div class="form-group"><label>Trạng Thái
                                    </label>
                                        <input type="tex" placeholder="Status" class="form-control">
                                    </div>
                                    <div class="form-group">

                                    </div>
                                    <div class="form-group">
                                        <div class="col-sm-3 col-sm-offset-2 pull-right">
                                            <button class="btn btn-primary" type="submit">Cập Nhật</button>
                                            <button class="btn btn-white" type="submit">Hủy</button>
                                        </div>
                                    </div>
                                </div>

                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>

</html>

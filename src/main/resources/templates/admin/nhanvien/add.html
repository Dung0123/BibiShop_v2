<!DOCTYPE html>
<html layout:decorate="~{admin/layout}" lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="wrapper wrapper-content" layout:fragment="content">
    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>Thêm Nhân Viên</h5>
                    <div class="ibox-tools">
                        <a class="collapse-link"><i class="fa fa-chevron-up"></i></a>
                        <a class="close-link"><i class="fa fa-times"></i></a>
                    </div>
                </div>
                <div class="ibox-content">
                    <div class="row">
                        <div class="col-lg-12">
                            <form role="form" id="employeeForm">
                                <div class="row">
                                    <div class="col-sm-6 b-r">
                                        <div class="form-group">
                                            <label>Email <span style="color: red">*</span></label>
                                            <input name="email" type="email" class="form-control" id="email" placeholder="Nhập email"/>
                                            <div class="invalid-feedback" id="invalid-feedback-email" style="color: red; display: none;">Email không hợp lệ.</div>
                                        </div>
                                        <div class="form-group">
                                            <label>Họ <span style="color: red">*</span></label>
                                            <input name="firstName" type="text" class="form-control" id="firstName" placeholder="Nhập họ"/>
                                            <div class="invalid-feedback" id="invalid-feedback-firstName" style="color: red; display: none;">Họ không được để trống.</div>
                                        </div>
                                        <div class="form-group">
                                            <label>Tên Đệm</label>
                                            <input name="midName" type="text" class="form-control" id="midName" placeholder="Nhập tên đệm"/>
                                            <div class="invalid-feedback" id="invalid-feedback-midName" style="color: red; display: none;">Tên đệm không được để trống.</div>
                                       </div>
                                        <div class="form-group">
                                            <label>Tên <span style="color: red">*</span></label>
                                            <input name="name"  type="text" class="form-control" id="name" placeholder="Nhập tên"/>
                                            <div class="invalid-feedback" id="invalid-feedback-name" style="color: red; display: none;">Tên không được để trống.</div>
                                        </div>
                                        <div class="form-group">
                                            <label>Số Điện Thoại <span style="color: red">*</span></label>
                                            <input name="sdt" type="text" class="form-control" id="sdt" placeholder="Nhập số điện thoại"/>
                                            <div class="invalid-feedback" id="invalid-feedback-sdt" style="color: red; display: none;">Số điện thoại không hợp lệ.</div>
                                        </div>
                                    </div>
                                    <div class="col-sm-6">
                                        <div class="form-group">
                                            <label>Ngày Sinh <span style="color: red">*</span></label>
                                            <input name="dob" type="date" class="form-control" id="dob"/>
                                            <div class="invalid-feedback" id="invalid-feedback-dob" style="color: red; display: none;">Ngày sinh không được để trống.</div>
                                        </div>
                                        <div class="form-group">
                                            <label>Mật khẩu <span style="color: red">*</span></label>
                                            <input name="password" type="password" class="form-control" id="password" placeholder="Nhập mật khẩu"/>
                                            <div class="invalid-feedback" id="invalid-feedback-password" style="color: red; display: none;">Mật khẩu không được để trống.</div>
                                        </div>
                                        <div class="form-group">
                                            <label>Vị trí công việc <span style="color: red">*</span></label>
                                            <select name="position" class="form-control" id="position">
                                                <option value="">Chọn vị trí</option>
                                                <option value="1">Admin</option>
                                                <option value="2">Nhân viên</option>
                                            </select>
                                            <div class="invalid-festatusedback" id="invalid-feedback-position" style="color: red; display: none;">Vui lòng chọn vị trí công việc.</div>
                                        </div>
                                        <div class="form-group">
                                            <label>Trạng Thái <span style="color: red">*</span></label>
                                            <select name="status"  class="form-control" id="trangThai">
                                                <option value="">Chọn trạng thái</option>
                                                <option value="1">Hoạt động</option>
                                                <option value="0">Không hoạt động</option>
                                            </select>
                                            <div class="invalid-feedback" id="invalid-feedback-trangThai" style="color: red; display: none;">Vui lòng chọn trạng thái.</div>
                                        </div>
                                        <div class="form-group">
                                            <label>Giới Tính <span style="color: red">*</span></label>
                                            <select name="gender" class="form-control" id="gender">
                                                <option value="">Chọn giới tính</option>
                                                <option value="0">Nam</option>
                                                <option value="1">Nữ</option>
                                            </select>
                                            <div class="invalid-feedback" id="invalid-feedback-gender" style="color: red; display: none;">Vui lòng chọn giới tính.</div>
                                        </div>
                                        <div class="form-group">
                                            <div class="col-sm-12 text-right">
                                                <button id="btnAddEmployee" type="button" class="btn btn-primary btn-create-button">Thêm</button>
                                                <a th:href="@{/admin/nhanvien/list}" class="btn btn-white">Hủy</a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
    </div>
</div>
    <script>
        document.getElementById('btnAddEmployee').addEventListener('click', function (event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const midName = document.getElementById('midName').value.trim();
            const name = document.getElementById('name').value.trim();
            const sdt = document.getElementById('sdt').value.trim();
            const dob = document.getElementById('dob').value;
            const password = document.getElementById('password').value.trim();
            const position = document.getElementById('position').value;
            const status = document.getElementById('trangThai').value;
            const gender = document.getElementById('gender').value;

            let isValid = true;

            function showError(id, condition) {
                const el = document.getElementById(id);
                el.style.display = condition ? 'block' : 'none';
                if (condition) isValid = false;
            }

            showError('invalid-feedback-email', !email);
            showError('invalid-feedback-firstName', !firstName);
            showError('invalid-feedback-midName', !midName);
            showError('invalid-feedback-name', !name);
            showError('invalid-feedback-sdt', !sdt);
            showError('invalid-feedback-dob', !dob);
            showError('invalid-feedback-password', !password);
            showError('invalid-feedback-position', !position);
            showError('invalid-feedback-trangThai', !status);
            showError('invalid-feedback-gender', !gender);

            if (isValid) {
                const formData = {
                    email: email,
                    firstName: firstName,
                    midName: midName,
                    name: name,
                    sdt: sdt,
                    dob: dob,
                    password: password,
                    position: position,
                    status: status,
                    gender: gender
                };

                fetch('/admin/nhanvien/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            Swal.fire({
                                icon: 'success',
                                title: 'Thành công',
                                text: 'Thêm nhân viên thành công!',
                                timer: 2000,
                                showConfirmButton: false
                            });

                            setTimeout(function () {
                                window.location.href = '/admin/nhanvien/list';
                            }, 2000);
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: 'Thất bại',
                                text: data.message || 'Có lỗi xảy ra!'
                            });
                        }
                    })
                    .catch(error => {
                        console.error('Lỗi gửi dữ liệu:', error);
                        Swal.fire({
                            icon: 'error',
                            title: 'Lỗi',
                            text: 'Đã xảy ra lỗi trong quá trình gửi dữ liệu.'
                        });
                    });
            }
        });
    </script>

</div>
</body>
</html>

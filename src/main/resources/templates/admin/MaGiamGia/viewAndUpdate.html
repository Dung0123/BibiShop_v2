<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết và Cập nhật Mã Giảm Giá</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
  <h2 class="text-center mb-4">Chi tiết và Cập nhật Mã Giảm Giá</h2>

  <!-- Hiển thị thông báo -->
  <div th:if="${message}" class="alert" th:classappend="${messageType == 'success' ? 'alert-success' : 'alert-danger'}">
    <span th:text="${message}"></span>
  </div>

  <!-- Form cập nhật mã giảm giá -->
  <form th:action="@{/templates/client/MaGiamGia/update/{id}(id=${updateMagiamgia.id})}" th:object="${updateMagiamgia}" method="post" class="row g-4">
    <div class="col-md-6">
      <div class="mb-3">
        <label for="ten" class="form-label">Tên Mã Giảm Giá</label>
        <input type="text" class="form-control" id="ten" th:field="*{ten}" required>
      </div>
      <div class="mb-3">
        <label for="ma" class="form-label">Mã Giảm Giá</label>
        <input type="text" class="form-control" id="ma" th:field="*{ma}" required>
      </div>
      <div class="mb-3" th:if="${updateMagiamgia.loaiVoucher == 1}">
        <label for="giaTriGiam" class="form-label">Phần Trăm Giảm (%)</label>
        <input type="number" class="form-control" id="giaTriGiam" th:field="*{giaTriGiam}" min="1" max="100" required>
      </div>
      <div class="mb-3" th:if="${updateMagiamgia.loaiVoucher == 0}">
        <label for="giaTriGiam" class="form-label">Giá Trị Giảm</label>
        <input type="number" class="form-control" id="giaTriGiam" th:field="*{giaTriGiam}" min="100" required>
      </div>
    </div>
    <div class="col-md-6">
      <div class="mb-3" th:if="${updateMagiamgia.loaiVoucher == 1}">
        <label for="giamToiDa" class="form-label">Giá Trị Giảm Tối Đa</label>
        <input type="number" class="form-control" id="giamToiDa" th:field="*{giamToiDa}" min="100" required>
      </div>
      <div class="mb-3" th:if="${updateMagiamgia.loaiVoucher == 0}">
        <label for="donToiThieu" class="form-label">Giá Trị Đơn Tối Thiểu</label>
        <input type="number" class="form-control" id="donToiThieu" th:field="*{donToiThieu}" min="1000" required>
      </div>
      <div class="mb-3">
        <label for="soLuong" class="form-label">Số Lượng</label>
        <input type="number" class="form-control" id="soLuong" th:field="*{soLuong}" min="1" required>
      </div>
      <div class="mb-3">
        <label for="ngayBatDau" class="form-label">Ngày Bắt Đầu</label>
        <input type="date" class="form-control" id="ngayBatDau" th:field="*{ngayBatDau}" required>
      </div>
      <div class="mb-3">
        <label for="ngayKetThuc" class="form-label">Ngày Kết Thúc</label>
        <input type="date" class="form-control" id="ngayKetThuc" th:field="*{ngayKetThuc}" required>
      </div>
      <div class="mb-3">
        <label for="trangThai" class="form-label">Trạng Thái</label>
        <select class="form-select" id="trangThai" th:field="*{trangThai}">
          <option value="1">Hoạt động</option>
          <option value="0">Ngừng hoạt động</option>
        </select>
      </div>
    </div>
    <div class="text-center mt-4">
      <button type="submit" class="btn btn-dark me-2">Cập nhật</button>
      <a th:href="@{/templates/client/MaGiamGia/list}" class="btn btn-secondary">Quay lại</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

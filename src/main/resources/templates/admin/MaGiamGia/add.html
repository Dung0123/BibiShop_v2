<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Thêm Mã Giảm Giá</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .error-message {
      color: red;
      font-size: 0.9em;
      margin-top: 5px;
      display: none;
    }
    .form-control.is-invalid {
      border-color: #dc3545;
    }
  </style>
</head>
<body>
<div class="container mt-5">
  <h2 class="text-center mb-4">Thêm Mã Giảm Giá</h2>
  <div th:if="${message}" class="alert" th:classappend="${messageType == 'success' ? 'alert-success' : 'alert-danger'}">
    <span th:text="${message}"></span>
  </div>

  <ul class="nav nav-tabs" id="discountTabs" role="tablist">
    <li class="nav-item">
      <a class="nav-link active" id="percentage-tab" data-bs-toggle="tab" href="#percentage" role="tab">Giảm Theo Phần Trăm</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" id="value-tab" data-bs-toggle="tab" href="#value" role="tab">Giảm Theo Giá Trị</a>
    </li>
  </ul>

  <div class="tab-content mt-3" id="discountTabContent">
    <!-- Percentage Discount Form -->
    <div class="tab-pane fade show active" id="percentage" role="tabpanel">
      <form th:action="@{/templates/client/MaGiamGia/add/percentage}" th:object="${percentageDiscount}" method="post" class="row g-4">
        <div class="col-md-6">
          <div class="mb-3">
            <label for="tenPercentage" class="form-label">Tên Mã Giảm Giá</label>
            <input type="text" class="form-control" id="tenPercentage" th:field="*{ten}" required>
            <span class="error-message" id="tenPercentageError"></span>
          </div>
          <div class="mb-3">
            <label for="maPercentage" class="form-label">Mã Giảm Giá (Tùy chọn)</label>
            <input type="text" class="form-control" id="maPercentage" th:field="*{ma}">
          </div>
          <div class="mb-3">
            <label for="phanTramGiam" class="form-label">Phần Trăm Giảm (%)</label>
            <input type="number" class="form-control" id="phanTramGiam" th:field="*{phanTramGiam}" required>
            <span class="error-message" id="phanTramGiamError"></span>
          </div>
        </div>
        <div class="col-md-6">
          <div class="mb-3">
            <label for="giamToiDa" class="form-label">Giá Trị Giảm Tối Đa</label>
            <input type="number" class="form-control" id="giamToiDa" th:field="*{giamToiDa}" required>
            <span class="error-message" id="giamToiDaError"></span>
          </div>
          <div class="mb-3">
            <label for="soLuongPercentage" class="form-label">Số Lượng</label>
            <input type="number" class="form-control" id="soLuongPercentage" th:field="*{soLuong}" required>
            <span class="error-message" id="soLuongPercentageError"></span>
          </div>
          <div class="mb-3">
            <label for="ngayBatDauPercentage" class="form-label">Ngày Bắt Đầu</label>
            <input type="date" class="form-control" id="ngayBatDauPercentage" th:field="*{ngayBatDau}" required>
            <span class="error-message" id="ngayBatDauPercentageError"></span>
          </div>
          <div class="mb-3">
            <label for="ngayKetThucPercentage" class="form-label">Ngày Kết Thúc</label>
            <input type="date" class="form-control" id="ngayKetThucPercentage" th:field="*{ngayKetThuc}" required>
            <span class="error-message" id="ngayKetThucPercentageError"></span>
          </div>
        </div>
        <div class="text-center">
          <button type="submit" class="btn btn-dark" id="submitPercentage" disabled>Thêm Mã Giảm Giá</button>
          <a th:href="@{/templates/client/MaGiamGia/list}" class="btn btn-secondary">Hủy</a>
        </div>
      </form>
    </div>

    <!-- Value Discount Form -->
    <div class="tab-pane fade" id="value" role="tabpanel">
      <form th:action="@{/templates/client/MaGiamGia/add/value}" th:object="${valueDiscount}" method="post" class="row g-4">
        <div class="col-md-6">
          <div class="mb-3">
            <label for="tenValue" class="form-label">Tên Mã Giảm Giá</label>
            <input type="text" class="form-control" id="tenValue" th:field="*{ten}" required>
            <span class="error-message" id="tenValueError"></span>
          </div>
          <div class="mb-3">
            <label for="maValue" class="form-label">Mã Giảm Giá (Tùy chọn)</label>
            <input type="text" class="form-control" id="maValue" th:field="*{ma}">
          </div>
          <div class="mb-3">
            <label for="giaTriGiam" class="form-label">Giá Trị Giảm</label>
            <input type="number" class="form-control" id="giaTriGiam" th:field="*{giaTriGiam}" required>
            <span class="error-message" id="giaTriGiamError"></span>
          </div>
        </div>
        <div class="col-md-6">
          <div class="mb-3">
            <label for="donToiThieu" class="form-label">Giá Trị Đơn Tối Thiểu</label>
            <input type="number" class="form-control" id="donToiThieu" th:field="*{donToiThieu}" required>
            <span class="error-message" id="donToiThieuError"></span>
          </div>
          <div class="mb-3">
            <label for="soLuongValue" class="form-label">Số Lượng</label>
            <input type="number" class="form-control" id="soLuongValue" th:field="*{soLuong}" required>
            <span class="error-message" id="soLuongValueError"></span>
          </div>
          <div class="mb-3">
            <label for="ngayBatDauValue" class="form-label">Ngày Bắt Đầu</label>
            <input type="date" class="form-control" id="ngayBatDauValue" th:field="*{ngayBatDau}" required>
            <span class="error-message" id="ngayBatDauValueError"></span>
          </div>
          <div class="mb-3">
            <label for="ngayKetThucValue" class="form-label">Ngày Kết Thúc</label>
            <input type="date" class="form-control" id="ngayKetThucValue" th:field="*{ngayKetThuc}" required>
            <span class="error-message" id="ngayKetThucValueError"></span>
          </div>
        </div>
        <div class="text-center">
          <button type="submit" class="btn btn-dark" id="submitValue" disabled>Thêm Mã Giảm Giá</button>
          <a th:href="@{/templates/client/MaGiamGia/list}" class="btn btn-secondary">Hủy</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // Lấy ngày hiện tại
  const today = new Date().toISOString().split('T')[0];

  // Hàm hiển thị lỗi
  function validateField(elementId, condition, errorMessage) {
    const inputElement = document.getElementById(elementId);
    const errorElement = document.getElementById(elementId + 'Error');
    if (condition) {
      errorElement.textContent = errorMessage;
      errorElement.style.display = 'block';
      inputElement.classList.add('is-invalid');
      return false;
    } else {
      errorElement.textContent = '';
      errorElement.style.display = 'none';
      inputElement.classList.remove('is-invalid');
      return true;
    }
  }

  // Validation cho form giảm theo phần trăm
  function validatePercentageForm() {
    const ten = document.getElementById('tenPercentage').value.trim();
    const phanTramGiam = document.getElementById('phanTramGiam').value;
    const giamToiDa = document.getElementById('giamToiDa').value;
    const soLuong = document.getElementById('soLuongPercentage').value;
    const ngayBatDau = document.getElementById('ngayBatDauPercentage').value;
    const ngayKetThuc = document.getElementById('ngayKetThucPercentage').value;

    let isValid = true;

    isValid &= validateField('tenPercentage', ten.length < 3 || ten.length > 255, 'Tên phải từ 3 đến 255 ký tự');
    isValid &= validateField('phanTramGiam', !phanTramGiam || isNaN(phanTramGiam) || phanTramGiam <= 0 || phanTramGiam > 100, 'Phần trăm giảm phải từ 1 đến 100');
    isValid &= validateField('giamToiDa', !giamToiDa || isNaN(giamToiDa) || giamToiDa < 100, 'Giá trị giảm tối đa phải >= 100');
    isValid &= validateField('soLuongPercentage', !soLuong || isNaN(soLuong) || soLuong < 1, 'Số lượng phải >= 1');
    isValid &= validateField('ngayBatDauPercentage', !ngayBatDau || ngayBatDau < today, 'Ngày bắt đầu phải từ hôm nay trở đi');
    isValid &= validateField('ngayKetThucPercentage', !ngayKetThuc || new Date(ngayKetThuc) <= new Date(ngayBatDau), 'Ngày kết thúc phải sau ngày bắt đầu');

    document.getElementById('submitPercentage').disabled = !isValid;
  }

  // Validation cho form giảm theo giá trị
  function validateValueForm() {
    const ten = document.getElementById('tenValue').value.trim();
    const giaTriGiam = document.getElementById('giaTriGiam').value;
    const donToiThieu = document.getElementById('donToiThieu').value;
    const soLuong = document.getElementById('soLuongValue').value;
    const ngayBatDau = document.getElementById('ngayBatDauValue').value;
    const ngayKetThuc = document.getElementById('ngayKetThucValue').value;

    let isValid = true;

    isValid &= validateField('tenValue', ten.length < 3 || ten.length > 255, 'Tên phải từ 3 đến 255 ký tự');
    isValid &= validateField('giaTriGiam', giaTriGiam === '' || isNaN(giaTriGiam), 'Giá trị giảm không được để trống và phải là số');
    isValid &= validateField('donToiThieu', donToiThieu === '' || isNaN(donToiThieu), 'Giá trị đơn tối thiểu không được để trống và phải là số');
    isValid &= validateField('soLuongValue', !soLuong || isNaN(soLuong) || soLuong < 1, 'Số lượng phải >= 1');
    isValid &= validateField('ngayBatDauValue', !ngayBatDau || ngayBatDau < today, 'Ngày bắt đầu phải từ hôm nay trở đi');
    isValid &= validateField('ngayKetThucValue', !ngayKetThuc || new Date(ngayKetThuc) <= new Date(ngayBatDau), 'Ngày kết thúc phải sau ngày bắt đầu');

    document.getElementById('submitValue').disabled = !isValid;
  }

  // Gắn sự kiện cho các input
  document.querySelectorAll('#percentage input').forEach(input => input.addEventListener('input', validatePercentageForm));
  document.querySelectorAll('#value input').forEach(input => input.addEventListener('input', validateValueForm));

  // Kiểm tra ban đầu khi tải trang
  window.addEventListener('load', () => {
    validatePercentageForm();
    validateValueForm();
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

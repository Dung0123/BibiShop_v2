<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Danh sách Mã Giảm Giá</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
</head>
<body>
<div class="container mt-4">
  <h2 class="text-center">Danh sách Mã Giảm Giá</h2>

  <div>
    <a th:href="@{/templates/client/MaGiamGia/add}" class="btn btn-dark mb-3">Thêm Mã Giảm Giá</a>
  </div>

  <!-- Bảng hiển thị danh sách mã giảm giá -->
  <table class="table table-bordered table-striped mt-3">
    <thead class="thead-dark">
    <tr>
      <th>STT</th>
      <th>Tên</th>
      <th>Mã</th>
      <th>Giá trị giảm</th>
      <th>Loại giảm giá</th>
      <th>Ngày kết thúc</th>
      <th>Trạng thái</th>
      <th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
    <!-- Lặp qua từng mã giảm giá trong danh sách -->
    <tr th:each="vc, iterStat : ${list.content}">
      <td th:text="${iterStat.count}">1</td>
      <td th:text="${vc.ten}">Tên</td>
      <td th:text="${vc.ma}">Mã giảm giá</td>
      <td th:text="${vc.giaTriGiam} + ${vc.loaiVoucher == 1 ? '%' : ''}">0</td>
      <td th:text="${vc.loaiVoucher == 1 ? 'Giảm theo phần trăm' : 'Giảm theo giá trị'}">Loại</td>
      <td class="text-danger" th:text="${vc.ngayKetThuc}">Ngày kết thúc</td>
      <td th:if="${vc.trangThai == 1}" class="text-success">Hoạt động</td>
      <td th:if="${vc.trangThai == 0}" class="text-danger">Ngừng hoạt động</td>
      <td>
        <a th:href="@{/templates/client/MaGiamGia/view/{id}(id=${vc.id})}" class="btn btn-sm btn-light">Xem</a>
        <form th:action="@{/templates/client/MaGiamGia/delete/{id}(id=${vc.id})}" method="post"
              style="display:inline;"
              th:onsubmit="return confirm('Bạn có chắc chắn muốn xóa mã giảm giá này không?')">
          <button type="submit" class="btn btn-sm btn-dark">Xóa</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <!-- Điều khiển phân trang -->
  <nav aria-label="Page navigation">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${list.hasPrevious()} ? '' : 'disabled'">
        <a class="page-link"
           th:href="@{/templates/client/MaGiamGia/list(page=${list.number - 1}, size=${list.size})}"
           aria-label="Previous">
          <span aria-hidden="true">«</span>
        </a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(0, list.totalPages - 1)}"
          th:classappend="${list.number == i} ? 'active'">
        <a class="page-link" th:href="@{/templates/client/MaGiamGia/list(page=${i + 1}, size=${list.size})}"
           th:text="${i + 1}">1</a>
      </li>
      <li class="page-item" th:classappend="${list.hasNext()} ? '' : 'disabled'">
        <a class="page-link"
           th:href="@{/templates/client/MaGiamGia/list(page=${list.number + 1}, size=${list.size})}"
           aria-label="Next">
          <span aria-hidden="true">»</span>
        </a>
      </li>
    </ul>
  </nav>
</div>

<!--<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>-->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chi Tiết Đợt Giảm Giá</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #fff; color: #000; }
    .container { max-width: 600px; }
    .form-control { border: 1px solid #000; color: #000; background-color: #fff; }
    .form-control.is-invalid { border-color: #000; background-color: #f8f9fa; }
    .error-message { color: #000; font-size: 0.9em; margin-top: 5px; display: none; }
    .btn-dark { background-color: #000; border-color: #000; }
    .btn-dark:disabled { background-color: #666; border-color: #666; }
    .btn-secondary { background-color: #fff; border: 1px solid #000; color: #000; }
    .btn-secondary:hover { background-color: #000; color: #fff; }
    .alert-success { background-color: #fff; border: 1px solid #000; color: #000; }
    .alert-danger { background-color: #fff; border: 1px solid #000; color: #000; }
  </style>
</head>
<body>
<div class="container mt-5">
  <h2 class="text-center mb-4">Chi Tiết Đợt Giảm Giá</h2>
  <div th:if="${message}" class="alert" th:classappend="${messageType == 'success' ? 'alert-success' : 'alert-danger'}">
    <span th:text="${message}"></span>
  </div>

  <form th:action="@{/templates/zzz/client/dotgiamgia/update/{id}(id=${updateDotGiamGia.id})}" th:object="${updateDotGiamGia}" method="post" class="row g-3">
    <div class="mb-3">
      <label for="ten" class="form-label">Tên Đợt Giảm Giá</label>
      <input type="text" class="form-control" id="ten" th:field="*{ten}" required>
      <span class="error-message" id="tenError"></span>
    </div>
    <div class="mb-3">
      <label for="ma" class="form-label">Mã Đợt Giảm Giá (Tùy chọn)</label>
      <input type="text" class="form-control" id="ma" th:field="*{ma}">
    </div>
    <div class="mb-3">
      <label for="giaTriGiam" class="form-label">Giá Trị Giảm</label>
      <input type="number" class="form-control" id="giaTriGiam" th:field="*{giaTriGiam}" required>
      <span class="error-message" id="giaTriGiamError"></span>
    </div>
    <div class="mb-3">
      <label for="ngayBatDau" class="form-label">Ngày Bắt Đầu</label>
      <input type="date" class="form-control" id="ngayBatDau" th:field="*{ngayBatDau}" required>
      <span class="error-message" id="ngayBatDauError"></span>
    </div>
    <div class="mb-3">
      <label for="ngayKetThuc" class="form-label">Ngày Kết Thúc</label>
      <input type="date" class="form-control" id="ngayKetThuc" th:field="*{ngayKetThuc}" required>
      <span class="error-message" id="ngayKetThucError"></span>
    </div>
    <div class="text-center">
      <button type="submit" class="btn btn-dark" id="submitButton" disabled>Cập Nhật</button>
      <a th:href="@{/templates/zzz/client/dotgiamgia/list}" class="btn btn-secondary">Hủy</a>
    </div>
  </form>
</div>

<script>
  const today = new Date().toISOString().split('T')[0];

  function validateField(elementId, condition, errorMessage) {
    const input = document.getElementById(elementId);
    const error = document.getElementById(elementId + 'Error');
    if (condition) {
      error.textContent = errorMessage;
      error.style.display = 'block';
      input.classList.add('is-invalid');
      return false;
    } else {
      error.textContent = '';
      error.style.display = 'none';
      input.classList.remove('is-invalid');
      return true;
    }
  }

  function validateForm() {
    const ten = document.getElementById('ten').value.trim();
    const giaTriGiam = document.getElementById('giaTriGiam').value;
    const ngayBatDau = document.getElementById('ngayBatDau').value;
    const ngayKetThuc = document.getElementById('ngayKetThuc').value;

    let isValid = true;

    isValid &= validateField('ten', ten.length < 3 || ten.length > 255, 'Tên phải từ 3 đến 255 ký tự');
    isValid &= validateField('giaTriGiam', !giaTriGiam || isNaN(giaTriGiam) || giaTriGiam <= 0, 'Giá trị giảm phải là số dương');
    isValid &= validateField('ngayBatDau', !ngayBatDau || ngayBatDau < today, 'Ngày bắt đầu phải từ hôm nay trở đi');
    isValid &= validateField('ngayKetThuc', !ngayKetThuc || new Date(ngayKetThuc) <= new Date(ngayBatDau), 'Ngày kết thúc phải sau ngày bắt đầu');

    document.getElementById('submitButton').disabled = !isValid;
  }

  document.querySelectorAll('input').forEach(input => input.addEventListener('input', validateForm));
  window.addEventListener('load', validateForm);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

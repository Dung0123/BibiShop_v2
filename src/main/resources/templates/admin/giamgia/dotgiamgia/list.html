<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head
<meta charset="UTF-8">
<title>Danh Sách Đợt Giảm Giá</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
<style>
  body {
    background-color: #fff;
    color: #000;
  }


  .btn-dark {
    background-color: #000;
    border-color: #000;
  }

  .btn-dark:hover {
    background-color: #333;
  }

  .btn-white {
    background-color: #fff;
    border: 1px solid #000;
    color: #000;
  }

  .btn-white:hover {
    background-color: #000;
    color: #fff;
  }

  .page-link {
    color: #000;
    border: 1px solid #000;
  }

  .page-item.active .page-link {
    background-color: #000;
    color: #fff;
  }

  .page-item.disabled .page-link {
    color: #666;
  }
</style>
</head>
<body>
<div class="container mt-4">
  <h2 class="text-center">Danh Sách Đợt Giảm Giá</h2>
  <a th:href="@{/templates/zzz/client/dotgiamgia/add}" class="btn btn-dark mb-3">Thêm Đợt Giảm Giá</a>

  <table class="table table-bordered table-striped mt-3">
    <thead class="thead-dark">
    <tr>
      <th>ID</th>
      <th>Tên</th>
      <th>Mã</th>
      <th>Giá Trị Giảm</th>
      <th>Ngày Bắt Đầu</th>
      <th>Ngày Kết Thúc</th>
      <th>Trạng Thái</th>
      <th>Hành Động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="dotgiamgia : ${list.content}">
      <td th:text="${dotgiamgia.id}"></td>
      <td th:text="${dotgiamgia.ten}"></td>
      <td th:text="${dotgiamgia.ma}"></td>
      <td th:text="${dotgiamgia.giaTriGiam}"></td>
      <td th:text="${dotgiamgia.ngayBatDau}"></td>
      <td th:text="${dotgiamgia.ngayKetThuc}"></td>

      <td th:if="${dotgiamgia.trangThai == 1}" class="text-success">Hoạt động</td>
      <td th:if="${dotgiamgia.trangThai == 0}" class="text-danger">Ngừng hoạt động</td>
      <td>
        <a th:href="@{/templates/zzz/client/dotgiamgia/view/{id}(id=${dotgiamgia.id})}"
           class="btn btn-white btn-sm">Xem</a>
        <form th:action="@{/templates/zzz/client/dotgiamgia/delete/{id}(id=${dotgiamgia.id})}" method="post"
              style="display:inline;"
              th:onsubmit="return confirm('Bạn có chắc chắn muốn ' + (${dotgiamgia.trangThai} == 1 ? 'dừng' : 'kích hoạt') + ' đợt giảm giá này không?')">
          <button type="submit" class="btn btn-dark btn-sm"
                  th:text="${dotgiamgia.trangThai == 1 ? 'Dừng' : 'Kích hoạt'}"></button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <nav aria-label="Page navigation">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${list.hasPrevious()} ? '' : 'disabled'">
        <a class="page-link"
           th:href="@{/templates/zzz/client/dotgiamgia/list(page=${list.number - 1}, size=${list.size})}"
           aria-label="Previous">«</a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(0, list.totalPages - 1)}"
          th:classappend="${list.number == i} ? 'active'">
        <a class="page-link" th:href="@{/templates/zzz/client/dotgiamgia/list(page=${i + 1}, size=${list.size})}"
           th:text="${i + 1}"></a>
      </li>
      <li class="page-item" th:classappend="${list.hasNext()} ? '' : 'disabled'">
        <a class="page-link"
           th:href="@{/templates/zzz/client/dotgiamgia/list(page=${list.number + 1}, size=${list.size})}"
           aria-label="Next">»</a>
      </li>
    </ul>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

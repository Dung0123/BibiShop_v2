<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${title} ?: 'Bibi Shop Admin'"></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .main-content { display: flex; flex: 1; }
    .sidebar { width: 250px; background-color: #f8f9fa; padding: 20px; border-right: 1px solid #dee2e6; }
    .content { flex: 1; padding: 20px; }
    footer { background-color: #f8f9fa; padding: 10px 0; text-align: center; }
  </style>
  <th:block th:replace="~{fragments/head :: customHead}"></th:block>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<div class="main-content">
  <nav class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <main class="content">
    <th:block th:replace="~{this :: body}"></th:block>
  </main>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
